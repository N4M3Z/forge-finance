name: Quality

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - uses: dtolnay/rust-toolchain@stable

            - name: Install tools
              run: |
                  pip install pyyaml
                  cargo install --git https://github.com/N4M3Z/forge-cli forge

            - name: Validate
              uses: j178/prek-action@v2
